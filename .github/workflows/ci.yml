# CI deterministica: logica, contratti dati, validator statici e build.
# I check Playwright restano locali: richiedono browser/dev server e producono
# evidenza visuale, non devono rendere instabile la pipeline base.
name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run test:integration
      - run: npm run test:content
      - run: npm run test:regression
      - run: npm run validate:content
      - run: npm run validate:meme-packs
      - run: npm run audit:professional:visual:strict
      - run: npm run audit:text-legibility
      - run: npm run audit:input-contracts
      - run: node scripts/check-evolutions.mjs
      - run: npm run build
